<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>English Learning</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Encodes the full path into the query string so the main index.html can redirect
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + (l.search ? l.search : '') + l.hash)
      );
    </script>
  </head>
  <body></body>
</html>
